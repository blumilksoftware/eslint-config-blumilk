name: 'Checking the package: testing and linting'

on:
  pull_request:
    branches: [ 'main' ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'tests/**'
      - 'eslint.config.js'
      - 'eslint-progress-display.js'
      - 'typescript-config.js'
      - 'package.json'

jobs:
  build:
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install npm dependencies
        run: npm install

      - name: Run JS linter
        run: npm run lint

      - name: Execute tests
        run: npm run test
